<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Instagram Post</title>
  <link rel="stylesheet" href="styles.css">

  <!-- ICONOS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="post">

  <!-- HEADER -->
  <div class="post-header">
    <div class="user">
      <div class="profile-pic">5</div>
      <div>
        <div class="username">HTML5</div>
        <div class="location">Rigoberto</div>
      </div>
    </div>
    <i class="fa-solid fa-ellipsis-vertical"></i>
  </div>

  <!-- IMAGE -->
  <img src="https://picsum.photos/600/400" class="post-img">

  <!-- ACTIONS -->
  <div class="actions">
    <div class="left">
      <i class="fa-regular fa-heart"></i>
      <i class="fa-regular fa-comment"></i>
      <i class="fa-regular fa-paper-plane"></i>
    </div>
    <i class="fa-regular fa-bookmark"></i>
  </div>

  <!-- LIKES -->
  <div class="likes">
    Liked by <b>4GeeksAcademy</b>, <b>html5</b>, <b>Web</b> and <b>100,000 others</b>
  </div>

  <!-- CAPTION -->
  <div class="caption">
    <b>HTML5</b> Lorem ipsum dolor sit amet, consectetuer adipiscing elit...
  </div>

</div>

</body>
</html>
